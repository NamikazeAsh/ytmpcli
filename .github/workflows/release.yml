name: Build & Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller yt-dlp
      - run: pyinstaller ytmpcli.spec
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/ytmpcli.exe
